name: Release

# Triggered by pushing a version tag: git tag v1.0.0 && git push --tags
# Each platform builds natively (Windows .exe, macOS .dmg, Linux .AppImage/.deb)
# and uploads artifacts to a GitHub Release via electron-builder --publish always.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  release:
    name: Build & Release (${{ matrix.os }})

    strategy:
      fail-fast: false  # Let all platforms finish even if one fails
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact_glob: 'dist/*.exe'

          - os: macos-latest
            platform_flag: --mac
            artifact_glob: 'dist/*.dmg'

          - os: ubuntu-latest
            platform_flag: --linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # Linux: install libraries required by keytar (libsecret) and Electron
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libsecret-1-dev \
            libx11-dev \
            libxkbfile-dev \
            libglib2.0-dev \
            rpm \
            fakeroot

      - name: Install dependencies
        run: pnpm install

      - name: Build (electron-vite + widget)
        run: pnpm build
        env:
          # These are embedded into the main process bundle at build time.
          # Add them as repository secrets: Settings → Secrets → Actions.
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SHARED_SECRET: ${{ secrets.LASTFM_SHARED_SECRET }}

      - name: Package & Publish (${{ matrix.os }})
        run: pnpm exec electron-builder ${{ matrix.platform_flag }} --publish always
        env:
          # GITHUB_TOKEN is provided automatically; no secret configuration needed.
          # electron-builder uses it to create the Release and upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── macOS code signing ────────────────────────────────────────────────
          # Required to pass Gatekeeper without showing "unidentified developer".
          # CSC_LINK:                   base64-encoded .p12 certificate
          # CSC_KEY_PASSWORD:           password for the .p12
          # APPLE_ID:                   your Apple ID email
          # APPLE_APP_SPECIFIC_PASSWORD: app-specific password from appleid.apple.com
          # APPLE_TEAM_ID:              10-char team ID from developer.apple.com
          # Leave unset to produce an unsigned DMG (shows Gatekeeper warning).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # ── Windows code signing ──────────────────────────────────────────────
          # CSC_LINK / CSC_KEY_PASSWORD also apply on Windows for Authenticode.
          # Without signing, Windows SmartScreen will warn on first run.
